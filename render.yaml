services:
  # PostgreSQL
  - type: pserv
    name: diplom-postgres
    env: docker
    plan: free
    dockerfilePath: ./docker/Postgres.Dockerfile
    disk:
      name: pgdata
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_DB
        value: diplom
      - key: POSTGRES_USER
        generateValue: true
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Backend
  - type: web
    name: diplom-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diplom-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: diplom-redis
          type: redis
          property: connectionString
      - key: DEBUG
        value: "false"

  # Redis
  - type: redis
    name: diplom-redis
    plan: free
    ipAllowList: []

  # Frontend (static build served by backend)
  - type: web
    name: diplom-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://diplom-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: diplom-backend
          type: web
          property: host
